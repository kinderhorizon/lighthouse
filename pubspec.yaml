name: lighthouse
description: "Lighthouse AAC, a free open-source communication app for non-speaking children."
publish_to: 'none'

# Semantic version + build number. CFBundleShortVersionString = 0.1.0 (pre-alpha).
# Build 1: consumed by the failed TestFlight upload (90683); see docs/adr/0016.
# Build 2: never delivered, but its version code 2 was rejected by Play as a
# duplicate, so it is burned. Build 3 was the alpha re-release. Build 4 is the
# alpha build carrying the board-editor redesign (ADR 0019), the guided tour +
# first-use tips (ADR 0020), ARASAAC attribution + open-source licences screen,
# and the new microphone permission. Build 4 was uploaded to Play (so its
# version code is burned) but never published: it tripped a supported-devices
# regression because RECORD_AUDIO implies a required microphone feature. Build 5
# declares android.hardware.microphone as not-required to restore those devices.
# Build 6 carries the clinical review round (cold-start glow, post-pronoun verbs,
# glow-off = no hint, sentence replay uses recordings, 'Please' replaces 'Done'
# with its neural clip, the 7-step tour, record-voice on add, Export + fixed
# cross-platform Import). The +N drives both Android versionCode and iOS
# CFBundleVersion.
version: 1.0.0+11

environment:
  # Match the host dev toolchain (Flutter 3.44 / Dart 3.12). Tightened from
  # the flutter create default (3.4.4 / 3.22) on 2026-05-28 after the
  # post-scaffold toolchain upgrade.
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management with code generation (compile-time safety over runtime strings).
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # On-device persistence for bandit state, raw event log, and Knowledge Base.
  # See docs/adr/0005-isar-schema-versioning.md. Uses the community fork of
  # Isar v3 (the original isar 3.1.0 is unmaintained and incompatible with
  # AGP 8+); same v3 API, so collection-name versioning is unchanged.
  isar_community: 3.3.0
  isar_community_flutter_libs: 3.3.0

  # Text-to-Speech via system engines. Wrapped behind a TTSEngine interface
  # (see docs/adr/0004-tts-strategy.md) so Phase 2 Piper integration is a swap.
  flutter_tts: ^4.0.2

  # System share sheet for user-initiated crash log sharing
  # (see docs/adr/0002-no-automatic-telemetry.md).
  share_plus: ^12.0.2

  # Pre-addressed native mail composer for user-initiated "Send crash logs".
  # Opens the parent's own mail app (recipient + attachment pre-filled); the
  # parent taps send. NOT an app-originated upload: no KHF server is contacted
  # and transmission rides the parent's mail account (ADR 0002). Falls back to
  # the share sheet above when no mail account is configured.
  flutter_email_sender: ^8.0.0

  # Filesystem paths for crash log storage and Isar database location.
  path_provider: ^2.1.3

  # Device + app metadata for crash log whitelist (ADR 0002).
  device_info_plus: ^11.0.0
  package_info_plus: ^8.0.0

  # Small key-value persistence: onboarding state, settings, locale choice.
  # Isar is reserved for high-frequency bandit + event log persistence.
  shared_preferences: ^2.3.0

  # Photo selection for custom communication buttons. Uses the system photo
  # picker: PHPicker on iOS 14+ (no Photos permission prompt, no usage string)
  # and the Android photo picker. Deliberately NOT file_picker, whose iOS
  # dependency (DKImagePickerController/DKCamera) links Photos + Camera +
  # CoreLocation and tripped App Store 90683 for all three (ADR 0016).
  image_picker: ^1.1.2

  # Document picker for the JSON vocabulary-pack import (ADR 0015). Flutter-team
  # plugin backed by UIDocumentPickerViewController on iOS, so it does NOT pull
  # DKImagePickerController (the reason we left file_picker). The OS
  # share-receive surface (iOS UTI + Android intent-filter) is a separate
  # Phase 1 follow-up; this is the in-app path that always works.
  file_selector: ^1.0.3

  # Hashed WiFi SSID for the bandit's environmental context (PRD 3.1).
  # We never persist or transmit the raw SSID; ContextManager only ever
  # sees the SHA-256 prefix of it. The SSID is read via an Android-only
  # platform channel (lighthouse/wifi, see wifi_source.dart + MainActivity.kt),
  # NOT network_info_plus: that package linked iOS CoreLocation for
  # getWifiName(), which tripped Apple's location static-analysis (ADR 0016).
  # permission_handler still surfaces the Android ACCESS_FINE_LOCATION flow.
  permission_handler: ^11.3.0

  # Opens the Kinder Horizon Foundation website from the About screen.
  # The link-out is gated behind the math gate (parental gate) per the
  # App Store Education/Kids link-out rules; donations are handled on the
  # web, never in-app.
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.6

  # Pulled in by the gen_l10n-generated AppLocalizations (date/number/message
  # formatting). Version is pinned by the flutter_localizations SDK dep; `any`
  # defers to that constraint. See ADR 0008.
  intl: any

  # Plays the build-time pre-rendered core-vocabulary clips bundled under
  # assets/audio/ (the primary TTS path, see docs/adr/0004-tts-strategy.md
  # amendment). MP3 is decoded natively by just_audio on both iOS and Android,
  # so no transcode step is needed. System TTS (flutter_tts) stays as the
  # free-typed-text fallback. Also plays a parent-recorded custom-voice clip
  # (ADR 0019) when one exists for a tile, in place of TTS.
  just_audio: ^0.10.5

  # Microphone capture for the parent-recorded custom voice per tile (ADR 0019,
  # Board Editor redesign). On-device ONLY: a recording is saved beside the
  # other parent-authored data and is NEVER transmitted, never in a crash report
  # or feedback payload, and is reachable only behind the parental math gate.
  # This disclosure is already live on kinderhorizon.org/lighthouse/privacy.
  # Adds NSMicrophoneUsageDescription (iOS) + RECORD_AUDIO (Android).
  # Pinned to the 6.x family: the 5.x federated family is internally
  # inconsistent (record_linux 0.7.2 does not implement the platform interface
  # 5.x resolves, and Flutter type-checks every federated impl during the kernel
  # snapshot even on iOS), which breaks the build and CI. 6.x ships a consistent
  # family. We target iOS + Android only.
  record: ^6.0.0

  # SHA-256 hashing of the WiFi SSID for the bandit context key (privacy
  # load-bearing: the raw SSID is hashed and discarded, never stored or sent;
  # see lib/services/network/wifi_source.dart). A runtime dependency, not
  # tooling, so it belongs here, not in dev_dependencies.
  crypto: ^3.0.3

  # Ed25519 signature verification for OTA content manifests (ADR 0017). The
  # OTA channel changes what a non-speaking child's board says, so manifest
  # AUTHENTICITY (not just integrity) is verified on-device against a bundled
  # public-key trust-list. crypto (above) only does hashing, not signatures.
  cryptography: ^2.7.0

  # Runtime HTTP client for the OTA "Check for updates" fetch (ADR 0017): the
  # ONLY runtime outbound client. Used HTTPS-only, against the KHF content
  # endpoint, carrying at most an app-version string (no device id / usage /
  # analytics, per the binding guardrail). Also used by build-time tooling.
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Used by integration_test/ (Isar native-library tests on a real
  # device/emulator). Not loaded by `flutter test` on the host.
  integration_test:
    sdk: flutter

  # Riverpod code generation. Compile-time provider safety.
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

  # NOTE: isar_community_generator is intentionally NOT a steady-state
  # dependency. Every 3.3.x release requires build ^3/^4, which conflicts
  # with riverpod_generator 2.x (build ^2); keeping both would block the
  # normal `dart run build_runner build` riverpod workflow. The committed
  # Isar *.g.dart files were generated with isar_community_generator 3.3.0
  # (its output embeds `version: '3.3.0'`, which the isar_community 3.3.0
  # runtime asserts at compile time, so the old isar 3.1.0 output does NOT
  # drop in). The collection schemas are frozen (ADR 0005 collection-name
  # versioning) so this regeneration is rare. To regenerate: temporarily
  # swap `riverpod_generator` for `isar_community_generator: 3.3.0` here,
  # `flutter pub get`, `dart run build_runner build`, then restore this
  # block and `git checkout -- lib/state/*.g.dart` (build_runner deletes
  # the riverpod outputs while its generator is absent). Revisit when we
  # move to Riverpod 3 (build ^4), which lets both generators co-resolve.

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

  # Launch/splash screen generation from the Beam mark. Run
  # `dart run flutter_native_splash:create` deliberately, NOT per build:
  # it rewrites the iOS LaunchScreen storyboard + asset catalog and the
  # Android splash resources. Replaces the flutter-create placeholder
  # launch image (which trips the `flutter build ipa` validation warning).
  flutter_native_splash: ^2.4.0

# App icon generation from the Beam mark (tools/branding/). Run
# `dart run flutter_launcher_icons` deliberately, NOT per build: it
# rewrites files under android/ and ios/. Geometry is locked to the
# clinical lead's sign-off; see tools/branding/README.md.
flutter_launcher_icons:
  image_path: "tools/branding/app-icon-1024.png"
  android: "ic_launcher"
  adaptive_icon_background: "#1F3A44"
  adaptive_icon_foreground: "tools/branding/app-icon-foreground-1024.png"
  # The foreground PNG already bakes in the safe-zone padding (mark at
  # ~55% so the beam tip lands just inside the 66% circle). The package
  # default 16% inset would double-shrink it on Android only, rendering
  # the mark small with extra ink margin. Inset 0 lets the art's own
  # sizing govern. Do NOT raise this on a baked-padding foreground;
  # combine baked-padding-art with inset 0 (predictable), not a non-zero
  # inset (risks clipping).
  adaptive_icon_foreground_inset: 0
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true

  assets:
    - boards/core_main.json
    # Fringe sub-boards reached from the home folders. Every home folder
    # link_id must have a board here (no-dead-folder invariant).
    - boards/board_food.json
    - boards/board_places.json
    - boards/board_people.json
    - boards/board_activities.json
    - boards/board_things.json
    - boards/board_feelings.json
    - boards/board_time.json
    - boards/board_body.json
    # Context-aware cold-start prior artifacts (ADR 0003), one per launch locale.
    # Generated by tools/cold_start_prior/; never hand-edit (regenerate via the
    # tool). A bare directory entry is non-recursive but bundles the three files
    # sitting directly in it. A missing/unsupported-locale file degrades to
    # base_weight at runtime (ContextualColdStart.empty), never an error.
    - assets/cold_start/
    - assets/arasaac/manifest.json
    # Flutter asset directory entries are NON-RECURSIVE: a bare
    # `assets/arasaac/` bundles only files sitting directly in that folder
    # (just the manifest), NOT the pictograms nested one level down. Each
    # Fitzgerald-category subdirectory must be listed explicitly or its
    # PNGs never ship (the grid renders with no symbols). tools/verify_assets.dart
    # asserts every manifest icon_uri's parent dir appears in this list.
    - assets/arasaac/activities/
    - assets/arasaac/body/
    - assets/arasaac/feelings/
    - assets/arasaac/folders/
    - assets/arasaac/food/
    - assets/arasaac/modifiers/
    - assets/arasaac/needs/
    - assets/arasaac/people/
    - assets/arasaac/places/
    - assets/arasaac/pronouns/
    - assets/arasaac/questions/
    - assets/arasaac/responses/
    - assets/arasaac/social/
    - assets/arasaac/things/
    - assets/arasaac/time/
    - assets/arasaac/verbs/
    - assets/brand/
    # Bundled third-party license texts, shown verbatim on the in-app
    # "Open-source licences" page via LicenseRegistry (lib/config/licenses.dart).
    # Loaded from these assets so the displayed text stays in sync with the file.
    - LICENSES/AtkinsonHyperlegible-OFL.txt
    - LICENSES/Cairo-OFL.txt
    # Pre-rendered TTS clips (docs/adr/0004 amendment). The manifest always
    # ships; the per-locale clip directories are added below as each locale's
    # clips are generated and committed (tools/tts/generate_clips.dart). Same
    # non-recursive rule as ARASAAC above: list every `assets/audio/<locale>/`
    # explicitly, never a bare `assets/audio/`. tools/verify_assets.dart asserts
    # every manifest clip path's parent dir appears in this list.
    - assets/audio/manifest.json
    - assets/audio/en/
    - assets/audio/es/
    - assets/audio/ar/

  # Bundled Arabic-capable font (Cairo, OFL, LICENSES/Cairo-OFL.txt). Wired as
  # the ar locale's requiredFontFamily and as an app-wide fontFamilyFallback so
  # Arabic glyphs always render from a bundled face, never the platform default
  # (many tablets ship a poor or missing Arabic system font). Variable font; a
  # single file covers all weights. Latin glyphs are covered too, so applying it
  # app-wide under ar is safe.
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo.ttf
    # Atkinson Hyperlegible (OFL, LICENSES/AtkinsonHyperlegible-OFL.txt). The
    # app-wide UI + tile-label face for the redesign. Designed by the Braille
    # Institute for maximum letter distinction, chosen deliberately for low-vision
    # and cognitive accessibility. Cairo stays as the Arabic face + fallback.
    - family: Atkinson Hyperlegible
      fonts:
        - asset: assets/fonts/AtkinsonHyperlegible-Regular.ttf
        - asset: assets/fonts/AtkinsonHyperlegible-Bold.ttf
          weight: 700
        - asset: assets/fonts/AtkinsonHyperlegible-Italic.ttf
          style: italic
        - asset: assets/fonts/AtkinsonHyperlegible-BoldItalic.ttf
          weight: 700
          style: italic
