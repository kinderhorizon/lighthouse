# Analyzer configuration for Lighthouse AAC.
include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Isar 3's generated collection code (lib/persistence/*.g.dart) calls
    # the generator's internal `*ByIndex` family which Isar marks as
    # experimental. We do not control the generated code, the calls are
    # idiomatic Isar usage, and the methods are stable in practice. Demote
    # the warning to ignore so CI does not fail on the generator's choice
    # of public surface.
    experimental_member_use: ignore

  exclude:
    # Generated by build_runner; we never hand-edit. Lint output is noise.
    - '**/*.g.dart'
    - '**/*.freezed.dart'

linter:
  rules:
    # avoid_print: false  # Uncomment to disable the `avoid_print` rule
